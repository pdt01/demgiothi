<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồng Hồ</title>
    <style>
        :root {
            --bg-liquid: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2c3e50;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body.dark-theme {
            --bg-liquid: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            --glass-bg: rgba(0, 0, 0, 0.35);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ecf0f1;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-liquid); background-attachment: fixed; color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; margin: 0; min-height: 100vh; overflow-x: hidden; transition: background 0.5s ease, color 0.5s ease;
        }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: var(--shadow); }
        .hidden { display: none !important; }

        /* BONG BÓNG MENU */
        .floating-bubble {
            position: fixed; top: 20px; right: 20px; border-radius: 30px; padding: 5px 10px; display: flex; align-items: center;
            gap: 8px; z-index: 9999; user-select: none; touch-action: none; transition: transform 0.1s ease-out;
        }
        .drag-handle { color: var(--text-main); cursor: grab; padding: 5px; display: flex; align-items: center; justify-content: center; width: 24px; opacity: 0.7; }
        .drag-handle:active { cursor: grabbing; }

        .floating-bubble button {
            background: rgba(255,255,255,0.2); border: 1px solid var(--glass-border); color: var(--text-main);
            font-size: 1.1rem; padding: 0; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; outline: none; font-weight: bold; flex-shrink: 0;
        }
        .floating-bubble button:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }

        .bubble-actions { display: flex; gap: 8px; overflow: hidden; max-width: 350px; transition: max-width 0.3s ease, opacity 0.3s ease; }
        .floating-bubble.collapsed .bubble-actions { max-width: 0; opacity: 0; pointer-events: none; }
        .svg-icon { width: 18px; height: 18px; fill: currentColor; }

        /* Thanh điều hướng */
        .nav-bar { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 200; border-radius: 20px; overflow: hidden; }
        .nav-bar a { color: var(--text-main); text-decoration: none; padding: 10px 20px; font-weight: bold; transition: 0.3s; background: transparent; }
        .nav-bar a:hover, .nav-bar a.active { background: rgba(255,255,255,0.25); }
        body.dark-theme .nav-bar a:hover, body.dark-theme .nav-bar a.active { background: rgba(255,255,255,0.15); }

        /* Bảng điều khiển */
        .control-panel {
            padding: 20px; border-radius: 20px; margin-top: 50px; margin-bottom: 25px;
            display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 600px; z-index: 100;
        }
        .control-group { display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        label { font-weight: 600; font-size: 14px; }
        input[type="number"] { padding: 6px; border-radius: 8px; border: 1px solid var(--glass-border); text-align: center; font-size: 14px; width: 60px; background: rgba(255,255,255,0.2); color: var(--text-main); font-weight: bold; outline: none; }
        body.dark-theme input[type="number"] { background: rgba(0,0,0,0.3); }
        .radio-group { display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.05); padding: 8px 20px; border-radius: 20px; border: 1px solid var(--glass-border); }
        body.dark-theme .radio-group { background: rgba(255,255,255,0.05); }

        button.btn-action {
            background: rgba(255,255,255,0.25); color: var(--text-main); border: 1px solid var(--glass-border);
            padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        body.dark-theme button.btn-action { background: rgba(255,255,255,0.1); }
        button.btn-action:hover { background: rgba(255,255,255,0.4); transform: translateY(-2px); }
        #btnStart { background: rgba(39, 174, 96, 0.7); color: white; border: none; }
        #btnPause { background: rgba(243, 156, 18, 0.7); color: white; border: none; }
        #btnReset { background: rgba(231, 76, 60, 0.7); color: white; border: none; }

        /* Bảng Đồng hồ chính */
        .board {
            border-radius: 20px; width: 85%; max-width: 800px; min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; margin: auto 0;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); transform-origin: center center;
        }
        .board.minimal { background: transparent !important; border-color: transparent !important; box-shadow: none !important; backdrop-filter: none !important; }

        .digital-clock { font-family: -apple-system, sans-serif; font-size: 10rem; font-weight: bold; color: var(--text-main); letter-spacing: -3px; }

        .time-up { display: none; position: absolute; top: 20px; font-size: 2.5rem; color: #e74c3c; font-weight: bold; text-transform: uppercase; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .time-up.break-mode { color: #2ecc71; } /* Màu xanh khi tới giờ nghỉ */

        .footer-copyleft { margin-top: 20px; font-size: 12px; text-align: center; opacity: 0.7; line-height: 1.5; font-weight: 500; }
        .footer-copyleft a { color: var(--text-main); text-decoration: underline; }

        @media (max-width: 600px) {
            .digital-clock { font-size: 5rem; }
            .board { min-height: 250px; width: 90%; }
        }
    </style>
</head>
<body>

    <div class="floating-bubble glass-panel" id="floatingMenu">
        <div class="drag-handle" id="dragHandle" title="Kéo để di chuyển">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z"/></svg>
        </div>
        <button id="btnCollapseBubble" title="Thu gọn/Mở rộng">◀</button>
        <div class="bubble-actions" id="bubbleActions">
            <button id="btnThemeToggle" title="Giao diện Sáng/Tối">🌗</button>
            <button id="btnToggleBoard" title="Ẩn nền bảng">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>
            </button>
            <button id="btnZoomOut" title="Thu nhỏ">-</button>
            <button id="btnZoomIn" title="Phóng to">+</button>
            <button id="btnToggleUI" title="Cài đặt">⚙️</button>
            <button id="btnFullscreen" title="Toàn màn hình">⛶</button>
        </div>
    </div>

    <div class="nav-bar glass-panel" id="navBar">
        <a href="index.html">Trục Giờ Thi</a>
        <a href="dongho.html" class="active">Đồng Hồ</a>
    </div>

    <div class="control-panel glass-panel" id="controlPanel">
        <div class="control-group">
            <div class="radio-group">
                <label><input type="radio" name="mode" value="realtime" checked> Giờ Thực Tế</label>
                <label><input type="radio" name="mode" value="countdown"> Đếm Ngược</label>
                <label><input type="radio" name="mode" value="pomodoro"> Pomodoro</label>
            </div>
        </div>
        
        <div class="control-group" id="countdownControls" style="display: none;">
            <label>Số phút đếm ngược: <input type="number" id="cdMinutes" value="25" min="1"></label>
        </div>

        <div class="control-group" id="pomodoroControls" style="display: none;">
            <label>Làm việc: <input type="number" id="pomoWork" value="25" min="1"> p</label>
            <label>Nghỉ ngơi: <input type="number" id="pomoBreak" value="5" min="1"> p</label>
        </div>

        <div class="control-group" id="actionControls" style="display: none;">
            <button class="btn-action" id="btnStart" onclick="startCountdown()">▶ Bắt Đầu</button>
            <button class="btn-action" id="btnPause" onclick="pauseCountdown()">⏸ Tạm Dừng</button>
            <button class="btn-action" id="btnReset" onclick="resetCountdown()">⏹ Đặt Lại</button>
        </div>
    </div>

    <div class="board glass-panel" id="mainBoard">
        <div class="time-up" id="timeUpMsg"></div>
        <div id="clockDisplay" class="digital-clock">00:00:00</div>
    </div>
    
    <div class="footer-copyleft" id="footerCopy">
        Phát triển bởi <a href="https://www.facebook.com/link-facebook-cua-ban" target="_blank">PDT and Friends</a> | 
        Giấy phép <a href="http://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>
    </div>

    <script>
        // --- CHUYỂN THEME ---
        document.getElementById('btnThemeToggle').addEventListener('click', () => document.body.classList.toggle('dark-theme'));

        // --- WAKE LOCK ---
        let wakeLock = null;
        async function keepScreenAwake() { try { if ('wakeLock' in navigator && wakeLock === null) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
        function allowScreenSleep() { if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); } }
        document.addEventListener('click', () => { if (mode === 'realtime' || isRunning) keepScreenAwake(); }, { once: true });
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && (isRunning || mode === 'realtime')) keepScreenAwake(); });

        // --- KÉO THẢ BONG BÓNG ---
        const floatingMenu = document.getElementById('floatingMenu');
        const dragHandle = document.getElementById('dragHandle');
        const btnCollapseBubble = document.getElementById('btnCollapseBubble');
        let isDragging = false, dragStartX, dragStartY;

        btnCollapseBubble.addEventListener('click', () => {
            floatingMenu.classList.toggle('collapsed');
            btnCollapseBubble.textContent = floatingMenu.classList.contains('collapsed') ? '▶' : '◀';
        });

        function dragStart(e) {
            if (e.target === dragHandle || dragHandle.contains(e.target)) {
                isDragging = true;
                dragStartX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
                dragStartY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
                floatingMenu.style.transition = 'none';
            }
        }
        function drag(e) {
            if (!isDragging) return; e.preventDefault();
            let dx = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - dragStartX;
            let dy = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - dragStartY;
            requestAnimationFrame(() => floatingMenu.style.transform = `translate3d(${dx}px, ${dy}px, 0)`);
        }
        function dragEnd() {
            if (!isDragging) return; isDragging = false;
            const rect = floatingMenu.getBoundingClientRect();
            floatingMenu.style.transform = 'none'; floatingMenu.style.transition = '';
            floatingMenu.style.top = Math.max(0, Math.min(rect.top, window.innerHeight - rect.height)) + 'px';
            if (rect.left + rect.width / 2 > window.innerWidth / 2) {
                floatingMenu.style.left = 'auto'; floatingMenu.style.right = Math.max(0, window.innerWidth - rect.right) + 'px';
            } else {
                floatingMenu.style.right = 'auto'; floatingMenu.style.left = Math.max(0, rect.left) + 'px';
            }
        }
        floatingMenu.addEventListener("touchstart", dragStart, { passive: false });
        document.addEventListener("touchmove", drag, { passive: false });
        document.addEventListener("touchend", dragEnd);
        floatingMenu.addEventListener("mousedown", dragStart);
        document.addEventListener("mousemove", drag);
        document.addEventListener("mouseup", dragEnd);

        // --- NÚT GIAO DIỆN ---
        const navBar = document.getElementById('navBar'); const controlPanel = document.getElementById('controlPanel');
        const boardEl = document.getElementById('mainBoard'); const footerCopy = document.getElementById('footerCopy');
        let currentScale = 1;

        document.getElementById('btnToggleUI').addEventListener('click', () => { navBar.classList.toggle('hidden'); controlPanel.classList.toggle('hidden'); footerCopy.classList.toggle('hidden'); });
        document.getElementById('btnFullscreen').addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); });
        document.getElementById('btnToggleBoard').addEventListener('click', () => {
            boardEl.classList.toggle('minimal');
            document.getElementById('btnToggleBoard').innerHTML = boardEl.classList.contains('minimal') ? '☐' : '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>';
        });
        document.getElementById('btnZoomIn').addEventListener('click', () => { if (currentScale < 2.5) { currentScale += 0.1; boardEl.style.transform = `scale(${currentScale})`; } });
        document.getElementById('btnZoomOut').addEventListener('click', () => { if (currentScale > 0.4) { currentScale -= 0.1; boardEl.style.transform = `scale(${currentScale})`; } });

        // --- LOGIC THỜI GIAN & POMODORO ---
        let mode = 'realtime';
        let realtimeInterval, countdownInterval;
        let isRunning = false, isPaused = false;
        let totalSeconds = 0;
        let isPomoWorkSession = true; // Trạng thái của Pomodoro
        let audioCtx;

        const clockDisplay = document.getElementById('clockDisplay');
        const countdownControls = document.getElementById('countdownControls');
        const pomodoroControls = document.getElementById('pomodoroControls');
        const actionControls = document.getElementById('actionControls');
        const btnStart = document.getElementById('btnStart');
        const btnPause = document.getElementById('btnPause');
        const timeUpMsg = document.getElementById('timeUpMsg');

        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                mode = e.target.value;
                if (mode === 'realtime') {
                    countdownControls.style.display = 'none';
                    pomodoroControls.style.display = 'none';
                    actionControls.style.display = 'none';
                    resetCountdown();
                    startRealtime();
                } else {
                    countdownControls.style.display = mode === 'countdown' ? 'flex' : 'none';
                    pomodoroControls.style.display = mode === 'pomodoro' ? 'flex' : 'none';
                    actionControls.style.display = 'flex';
                    
                    clearInterval(realtimeInterval);
                    resetCountdown();
                    allowScreenSleep();
                }
            });
        });

        function formatTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function updateDisplay(s) { clockDisplay.textContent = formatTime(s); }

        function startRealtime() {
            keepScreenAwake();
            const updateRealtime = () => {
                const now = new Date();
                clockDisplay.textContent = `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            };
            updateRealtime();
            realtimeInterval = setInterval(updateRealtime, 1000);
            timeUpMsg.style.display = 'none';
        }

        function getInitialSeconds() {
            if (mode === 'countdown') return parseInt(document.getElementById('cdMinutes').value) * 60;
            if (mode === 'pomodoro') return parseInt(document.getElementById(isPomoWorkSession ? 'pomoWork' : 'pomoBreak').value) * 60;
            return 0;
        }

        function startCountdown() {
            if (isRunning && !isPaused) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (!isPaused) totalSeconds = getInitialSeconds();
            
            keepScreenAwake();
            isRunning = true; isPaused = false;
            btnStart.style.display = 'none'; btnPause.style.display = 'block';
            
            // Xóa thông báo khi bắt đầu chạy
            timeUpMsg.style.display = 'none';
            timeUpMsg.classList.remove('break-mode');

            countdownInterval = setInterval(() => {
                totalSeconds--;
                updateDisplay(totalSeconds);
                
                if (totalSeconds <= 0) {
                    playAlarm();
                    
                    if (mode === 'pomodoro') {
                        // Đảo trạng thái: Đang làm -> Nghỉ, Đang Nghỉ -> Làm
                        isPomoWorkSession = !isPomoWorkSession;
                        totalSeconds = getInitialSeconds(); // Lấy số giây của phiên tiếp theo
                        updateDisplay(totalSeconds);
                        
                        // Hiện thông báo trạng thái 3 giây rồi tự chạy tiếp
                        timeUpMsg.style.display = 'block';
                        if (isPomoWorkSession) {
                            timeUpMsg.textContent = 'HẾT GIỜ NGHỈ! VÀO LÀM THÔI!';
                            timeUpMsg.classList.remove('break-mode');
                        } else {
                            timeUpMsg.textContent = 'TỚI GIỜ GIẢI LAO!';
                            timeUpMsg.classList.add('break-mode');
                        }
                        setTimeout(() => { if(isRunning) timeUpMsg.style.display = 'none'; }, 3500);

                    } else {
                        // Countdown bình thường thì dừng hẳn
                        clearInterval(countdownInterval);
                        isRunning = false;
                        allowScreenSleep();
                        btnStart.style.display = 'block'; btnPause.style.display = 'none';
                        timeUpMsg.textContent = 'HẾT GIỜ!';
                        timeUpMsg.classList.remove('break-mode');
                        timeUpMsg.style.display = 'block';
                    }
                }
            }, 1000);
        }

        function pauseCountdown() {
            clearInterval(countdownInterval); isPaused = true; allowScreenSleep();
            btnStart.style.display = 'block'; btnStart.textContent = '▶ Tiếp Tục'; btnPause.style.display = 'none';
        }

        function resetCountdown() {
            if (isRunning && !confirm("Đang đếm ngược! Bạn có chắc chắn muốn đặt lại không?")) return;
            clearInterval(countdownInterval);
            isRunning = false; isPaused = false; isPomoWorkSession = true; // Reset lại về ca làm việc
            allowScreenSleep();
            btnStart.style.display = 'block'; btnStart.textContent = '▶ Bắt Đầu'; btnPause.style.display = 'none';
            timeUpMsg.style.display = 'none';
            
            totalSeconds = getInitialSeconds();
            updateDisplay(totalSeconds);
        }

        function playAlarm() {
            const t = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator(), osc2 = audioCtx.createOscillator(), lfo = audioCtx.createOscillator();
            osc1.type = 'square'; osc1.frequency.value = 750; osc2.type = 'square'; osc2.frequency.value = 1000;
            lfo.type = 'sine'; lfo.frequency.value = 35;
            const lfoGain = audioCtx.createGain(), mainGain = audioCtx.createGain(), vca = audioCtx.createGain();
            lfoGain.gain.value = 1; vca.gain.value = 0.5;
            mainGain.gain.setValueAtTime(0, t); mainGain.gain.linearRampToValueAtTime(0.2, t + 0.1); 
            mainGain.gain.setValueAtTime(0.2, t + 2.5); mainGain.gain.exponentialRampToValueAtTime(0.001, t + 3);
            lfo.connect(lfoGain); lfoGain.connect(vca.gain); osc1.connect(vca); osc2.connect(vca); 
            vca.connect(mainGain); mainGain.connect(audioCtx.destination);
            osc1.start(t); osc2.start(t); lfo.start(t); osc1.stop(t + 3); osc2.stop(t + 3); lfo.stop(t + 3);
        }

        window.addEventListener('beforeunload', e => { if (isRunning) { e.preventDefault(); e.returnValue = ''; }});
        startRealtime();
    </script>
</body>
</html>
