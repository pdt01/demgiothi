<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồng Hồ</title>
    <style>
        :root {
            --board-bg: #1e5128;
            --board-border: #8b5a2b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* Bong bóng di động (Floating Bubble) chứa TẤT CẢ các nút */
        .floating-bubble {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(44, 62, 80, 0.9);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 9999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            user-select: none;
            touch-action: none; 
            transition: all 0.3s ease;
        }

        .drag-handle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            cursor: grab;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .drag-handle:active { cursor: grabbing; }

        .floating-bubble button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.2rem;
            padding: 0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            outline: none;
            font-family: monospace;
            font-weight: bold;
        }
        .floating-bubble button:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        /* Vùng chứa các nút hành động (để ẩn đi khi thu gọn) */
        .bubble-actions {
            display: flex;
            gap: 8px;
            overflow: hidden;
        }
        /* Class khi bong bóng bị thu gọn */
        .floating-bubble.collapsed .bubble-actions {
            display: none;
        }

        /* Thanh điều hướng */
        .nav-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 200;
            transition: all 0.3s;
        }
        .nav-bar a {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
        }
        .nav-bar a:hover, .nav-bar a.active {
            background: rgba(255,255,255,0.3);
        }

        .control-panel {
            background: #34495e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            z-index: 100;
            margin-top: 50px;
            transition: all 0.3s;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        input[type="number"] { padding: 8px; border-radius: 4px; border: none; text-align: center; font-size: 16px; width: 80px; }
        .radio-group { display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.2); padding: 8px 20px; border-radius: 20px; }

        .btn-action {
            padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; transition: all 0.2s;
        }
        #btnStart { background: #27ae60; color: white; }
        #btnPause { background: #f39c12; color: white; display: none; }
        #btnReset { background: #e74c3c; color: white; }

        /* Bảng phấn */
        .board {
            background-image: linear-gradient(to right, var(--board-bg), var(--board-bg));
            border: 15px solid var(--board-border);
            border-radius: 10px;
            width: 85%;
            max-width: 800px;
            min-height: 400px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 15px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: auto 0;
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: center center;
        }

        .board.minimal {
            background-color: transparent !important;
            background-image: none !important;
            border-color: transparent !important;
            box-shadow: none !important;
        }

        .digital-clock {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .time-up {
            display: none; position: absolute; top: 20px;
            font-size: 3rem; color: #e74c3c; font-family: 'Comic Sans MS', cursive, sans-serif;
            transform: rotate(-5deg); z-index: 50; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .footer-copyleft {
            margin-top: 20px; font-size: 11px; color: #bdc3c7; text-align: center; opacity: 0.6; line-height: 1.5;
        }

        @media (max-width: 600px) {
            .digital-clock { font-size: 5rem; }
            .board { min-height: 250px; width: 90%; }
        }
    </style>
</head>
<body>

    <div class="floating-bubble" id="floatingMenu">
        <div class="drag-handle" id="dragHandle" title="Kéo để di chuyển">⠿</div>
        <button id="btnCollapseBubble" title="Thu gọn/Mở rộng">◀</button>
        
        <div class="bubble-actions" id="bubbleActions">
            <button id="btnToggleBoard" title="Ẩn nền và viền bảng">☒</button>
            <button id="btnZoomOut" title="Thu nhỏ bảng">-</button>
            <button id="btnZoomIn" title="Phóng to bảng">+</button>
            <button id="btnToggleUI" title="Ẩn/Hiện Cài đặt">⚙️</button>
            <button id="btnFullscreen" title="Toàn màn hình">⛶</button>
        </div>
    </div>

    <div class="nav-bar" id="navBar">
        <a href="index.html">📋 Trục Giờ Thi</a>
        <a href="dongho.html" class="active">⏱ Đồng Hồ</a>
    </div>

    <div class="control-panel" id="controlPanel">
        <div class="control-group">
            <div class="radio-group">
                <label><input type="radio" name="mode" value="realtime" checked> Giờ Thực Tế</label>
                <label><input type="radio" name="mode" value="countdown"> Đếm Ngược</label>
            </div>
        </div>
        
        <div class="control-group" id="countdownControls" style="display: none;">
            <label style="color: white; font-weight: bold;">Phút:</label>
            <input type="number" id="cdMinutes" value="25" min="1">
            <button class="btn-action" id="btnStart" onclick="startCountdown()">▶ Bắt Đầu</button>
            <button class="btn-action" id="btnPause" onclick="pauseCountdown()">⏸ Tạm Dừng</button>
            <button class="btn-action" id="btnReset" onclick="resetCountdown()">⏹ Đặt Lại</button>
        </div>
    </div>

    <div class="board" id="mainBoard">
        <div class="time-up" id="timeUpMsg">HẾT GIỜ!</div>
        <div id="clockDisplay" class="digital-clock">00:00:00</div>
    </div>
    
    <div class="footer-copyleft" id="footerCopy">
        Công cụ này được phát triển bởi <a href="https://www.facebook.com/link-facebook-cua-ban" target="_blank" style="color: #f1c40f; text-decoration: none; font-weight: bold;">PDT and Friends</a>.<br>
        Được phân phối dưới giấy phép <a href="http://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" style="color: #3498db; text-decoration: none;">CC BY-NC-SA 4.0</a>
    </div>

    <script>
        // --- LOGIC KÉO THẢ VÀ THU GỌN BONG BÓNG MENU ---
        const floatingMenu = document.getElementById('floatingMenu');
        const dragHandle = document.getElementById('dragHandle');
        const btnCollapseBubble = document.getElementById('btnCollapseBubble');
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        // Xử lý thu gọn bong bóng
        btnCollapseBubble.addEventListener('click', () => {
            floatingMenu.classList.toggle('collapsed');
            if (floatingMenu.classList.contains('collapsed')) {
                btnCollapseBubble.textContent = '▶';
                btnCollapseBubble.title = "Mở rộng menu";
            } else {
                btnCollapseBubble.textContent = '◀';
                btnCollapseBubble.title = "Thu gọn menu";
            }
        });

        // Xử lý kéo thả
        function startDrag(e) {
            isDragging = true;
            const rect = floatingMenu.getBoundingClientRect();
            floatingMenu.style.right = 'auto';
            floatingMenu.style.left = rect.left + 'px';
            floatingMenu.style.top = rect.top + 'px';
            
            initialLeft = rect.left;
            initialTop = rect.top;
            
            if (e.type === 'touchstart') {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
            }
        }

        function doDrag(e) {
            if (!isDragging) return;
            e.preventDefault(); 
            let currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            
            let dx = currentX - startX;
            let dy = currentY - startY;
            
            let newLeft = initialLeft + dx;
            let newTop = initialTop + dy;
            
            const maxX = window.innerWidth - floatingMenu.offsetWidth;
            const maxY = window.innerHeight - floatingMenu.offsetHeight;
            newLeft = Math.max(0, Math.min(newLeft, maxX));
            newTop = Math.max(0, Math.min(newTop, maxY));
            
            floatingMenu.style.left = newLeft + 'px';
            floatingMenu.style.top = newTop + 'px';
        }

        function endDrag() { isDragging = false; }

        dragHandle.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup', endDrag);

        dragHandle.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', doDrag, {passive: false});
        document.addEventListener('touchend', endDrag);

        // --- XỬ LÝ ẨN/HIỆN GIAO DIỆN CHÍNH, TOÀN MÀN HÌNH VÀ ZOOM ---
        const navBar = document.getElementById('navBar');
        const controlPanel = document.getElementById('controlPanel');
        const boardEl = document.getElementById('mainBoard');
        const btnToggleBoard = document.getElementById('btnToggleBoard');
        const footerCopy = document.getElementById('footerCopy');
        let currentScale = 1;

        // Nút Cài đặt (Bánh răng)
        document.getElementById('btnToggleUI').addEventListener('click', () => {
            navBar.classList.toggle('hidden');
            controlPanel.classList.toggle('hidden');
            footerCopy.classList.toggle('hidden'); 
        });

        // Nút Toàn màn hình
        document.getElementById('btnFullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Trình duyệt không hỗ trợ toàn màn hình: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // Nút Ẩn/hiện nền bảng
        btnToggleBoard.addEventListener('click', () => {
            boardEl.classList.toggle('minimal');
            if (boardEl.classList.contains('minimal')) {
                btnToggleBoard.textContent = '☐';
                btnToggleBoard.title = "Hiện nền và viền bảng";
            } else {
                btnToggleBoard.textContent = '☒';
                btnToggleBoard.title = "Ẩn nền và viền bảng";
            }
        });

        // Nút Phóng to/Thu nhỏ bảng
        document.getElementById('btnZoomIn').addEventListener('click', () => {
            if (currentScale < 2.5) { 
                currentScale += 0.1;
                boardEl.style.transform = `scale(${currentScale})`;
            }
        });

        document.getElementById('btnZoomOut').addEventListener('click', () => {
            if (currentScale > 0.4) { 
                currentScale -= 0.1;
                boardEl.style.transform = `scale(${currentScale})`;
            }
        });

        // --- LOGIC ĐỒNG HỒ & ĐẾM NGƯỢC ---
        let mode = 'realtime';
        let realtimeInterval, countdownInterval;
        let isRunning = false;
        let isPaused = false;
        let totalSeconds = 0;
        let audioCtx;

        const clockDisplay = document.getElementById('clockDisplay');
        const countdownControls = document.getElementById('countdownControls');
        const btnStart = document.getElementById('btnStart');
        const btnPause = document.getElementById('btnPause');

        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                mode = e.target.value;
                if (mode === 'realtime') {
                    countdownControls.style.display = 'none';
                    resetCountdown();
                    startRealtime();
                } else {
                    countdownControls.style.display = 'flex';
                    clearInterval(realtimeInterval);
                    totalSeconds = parseInt(document.getElementById('cdMinutes').value) * 60;
                    updateDisplay(totalSeconds);
                }
            });
        });

        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function updateDisplay(s) {
            clockDisplay.textContent = formatTime(s);
        }

        function startRealtime() {
            const updateRealtime = () => {
                const now = new Date();
                const h = now.getHours();
                const m = now.getMinutes().toString().padStart(2,'0');
                const s = now.getSeconds().toString().padStart(2,'0');
                clockDisplay.textContent = `${h}:${m}:${s}`;
            };
            updateRealtime();
            realtimeInterval = setInterval(updateRealtime, 1000);
            document.getElementById('timeUpMsg').style.display = 'none';
        }

        function startCountdown() {
            if (isRunning && !isPaused) return;
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (!isPaused) {
                totalSeconds = parseInt(document.getElementById('cdMinutes').value) * 60;
            }
            
            isRunning = true;
            isPaused = false;
            btnStart.style.display = 'none';
            btnPause.style.display = 'block';
            document.getElementById('timeUpMsg').style.display = 'none';

            countdownInterval = setInterval(() => {
                totalSeconds--;
                updateDisplay(totalSeconds);
                if (totalSeconds <= 0) {
                    clearInterval(countdownInterval);
                    isRunning = false;
                    btnStart.style.display = 'block';
                    btnPause.style.display = 'none';
                    document.getElementById('timeUpMsg').style.display = 'block';
                    playAlarm();
                }
            }, 1000);
        }

        function pauseCountdown() {
            clearInterval(countdownInterval);
            isPaused = true;
            btnStart.style.display = 'block';
            btnStart.textContent = '▶ Tiếp Tục';
            btnPause.style.display = 'none';
        }

        function resetCountdown() {
            clearInterval(countdownInterval);
            isRunning = false;
            isPaused = false;
            btnStart.style.display = 'block';
            btnStart.textContent = '▶ Bắt Đầu';
            btnPause.style.display = 'none';
            document.getElementById('timeUpMsg').style.display = 'none';
            totalSeconds = parseInt(document.getElementById('cdMinutes').value) * 60;
            updateDisplay(totalSeconds);
        }

        function playAlarm() {
            const t = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator(); osc1.type = 'square'; osc1.frequency.value = 750;
            const osc2 = audioCtx.createOscillator(); osc2.type = 'square'; osc2.frequency.value = 1000;
            const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 35;
            const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 1;
            const mainGain = audioCtx.createGain(); mainGain.gain.setValueAtTime(0, t);
            mainGain.gain.linearRampToValueAtTime(0.2, t + 0.1); mainGain.gain.setValueAtTime(0.2, t + 2.5);
            mainGain.gain.exponentialRampToValueAtTime(0.001, t + 3);
            const vca = audioCtx.createGain(); vca.gain.value = 0.5;
            lfo.connect(lfoGain); lfoGain.connect(vca.gain);
            osc1.connect(vca); osc2.connect(vca); vca.connect(mainGain); mainGain.connect(audioCtx.destination);
            osc1.start(t); osc2.start(t); lfo.start(t);
            osc1.stop(t + 3); osc2.stop(t + 3); lfo.stop(t + 3);
        }

        window.addEventListener('beforeunload', function (e) {
            if (isRunning) {
                e.preventDefault(); 
                e.returnValue = ''; 
            }
        });

        startRealtime();
    </script>
</body>
</html>
