<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồng hồ</title>
    <style>
        :root {
            --bg-liquid: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2c3e50;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --glow-color: rgba(255, 255, 255, 0.5); 
            --active-bg: #2c3e50;
            --active-text: #ffffff;
        }

        body.dark-theme {
            --bg-liquid: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            --glass-bg: rgba(0, 0, 0, 0.35);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ecf0f1;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --glow-color: rgba(142, 197, 252, 0.25); 
            --active-bg: #ecf0f1;
            --active-text: #2c3e50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-liquid); background-attachment: fixed; color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; margin: 0; min-height: 100vh; overflow-x: hidden; transition: background 0.5s ease, color 0.5s ease;
        }

        .hidden { display: none !important; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: var(--shadow); }

        /* --- THANH CÔNG CỤ TRUNG TÂM (TOP TOOLBAR) --- */
        .top-toolbar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 10px;
            padding: 8px 15px; border-radius: 40px; z-index: 9999;
        }
        .top-toolbar button {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main); font-size: 1.1rem; padding: 0; border-radius: 50%;
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; outline: none; font-weight: bold; flex-shrink: 0;
        }
        .top-toolbar button:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        body.dark-theme .top-toolbar button:hover { background: rgba(0,0,0,0.4); }
        .svg-icon { width: 18px; height: 18px; fill: currentColor; }

        /* Thanh điều hướng */
        .nav-bar { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 200; border-radius: 20px; overflow: hidden; }
        .nav-bar a { color: var(--text-main); text-decoration: none; padding: 10px 20px; font-weight: bold; transition: 0.3s; background: transparent; border: none; }
        .nav-bar a:hover, .nav-bar a.active { background: rgba(255,255,255,0.25); box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        body.dark-theme .nav-bar a:hover, body.dark-theme .nav-bar a.active { background: rgba(255,255,255,0.15); }

        /* Bảng điều khiển */
        .control-panel {
            padding: 20px; border-radius: 24px; margin-top: 80px; margin-bottom: 25px;
            display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 650px; z-index: 100;
        }

        /* MENU CHỌN CHẾ ĐỘ ĐỒNG HỒ NẰM TRONG CÀI ĐẶT */
        .mode-selector-menu {
            display: flex; gap: 5px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
            padding: 6px; border-radius: 30px; border: 1px solid var(--glass-border);
            margin: 0 auto 5px auto; width: fit-content; justify-content: center;
        }
        body.dark-theme .mode-selector-menu { background: rgba(0,0,0,0.2); }
        
        .mode-option {
            padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 0.95rem; color: var(--text-main);
            cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;
        }
        .mode-option:hover { background: rgba(255,255,255,0.3); }
        body.dark-theme .mode-option:hover { background: rgba(0,0,0,0.4); }
        .mode-option.active { background: var(--active-bg); color: var(--active-text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .control-group { display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        label { font-weight: 600; font-size: 14px; }
        input[type="number"] { padding: 8px; border-radius: 8px; border: 1px solid var(--glass-border); text-align: center; font-size: 14px; width: 60px; background: rgba(255,255,255,0.2); color: var(--text-main); font-weight: bold; outline: none; }
        body.dark-theme input[type="number"] { background: rgba(0,0,0,0.3); }

        button.btn-action {
            background: rgba(255,255,255,0.25); color: var(--text-main); border: 1px solid var(--glass-border);
            padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); letter-spacing: 1px;
        }
        body.dark-theme button.btn-action { background: rgba(255,255,255,0.1); }
        button.btn-action:hover { background: rgba(255,255,255,0.4); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
        #btnStart { background: rgba(39, 174, 96, 0.9); color: white; border: none; }
        #btnPause { background: rgba(243, 156, 18, 0.9); color: white; border: none; display: none; }
        #btnReset { background: rgba(231, 76, 60, 0.9); color: white; border: none; }

        /* BẢNG HIỂN THỊ CHÍNH (Kính mờ bo góc) */
        .board {
            border-radius: 24px; padding: 60px 50px;
            width: 85%; max-width: 800px; min-height: 350px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; margin: auto 0;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: center center;
        }
        .board.minimal { background: transparent !important; border-color: transparent !important; box-shadow: none !important; backdrop-filter: none !important; }

        .digital-clock { font-family: -apple-system, sans-serif; font-size: 10rem; font-weight: bold; color: var(--text-main); letter-spacing: -3px; text-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--accent-glow); }

        .time-up { display: none; position: absolute; bottom: 30px; font-size: 2.5rem; color: #e74c3c; font-weight: bold; text-transform: uppercase; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .time-up.break-mode { color: #2ecc71; }

        .footer-copyleft { margin-top: 20px; font-size: 12px; text-align: center; opacity: 0.7; line-height: 1.5; font-weight: 500; }
        .footer-copyleft a { color: var(--text-main); text-decoration: underline; font-weight: bold; }

        @media (max-width: 600px) {
            .nav-bar { top: 75px; left: 50%; transform: translateX(-50%); width: max-content; }
            .control-panel { margin-top: 135px; }
            .digital-clock { font-size: 5rem; }
            .board { min-height: 250px; width: 95%; padding: 40px 20px; }
            .mode-option { padding: 6px 12px; font-size: 0.8rem; }
            .top-toolbar { width: max-content; padding: 6px 12px; gap: 8px; }
            .top-toolbar button { width: 34px; height: 34px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="top-toolbar glass-panel" id="topToolbar">
        <button id="btnThemeToggle" title="Giao diện Sáng/Tối">🌗</button>
        <button id="btnToggleBoard" title="Ẩn nền bảng">
            <svg class="svg-icon" id="iconBoard" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/><path d="M14.59 8L12 10.59 9.41 8 8 9.41 10.59 12 8 14.59 9.41 16 12 13.41 14.59 16 16 14.59 13.41 12 16 9.41 14.59 8z"/></svg>
        </button>
        <button id="btnZoomOut" title="Thu nhỏ bảng">-</button>
        <button id="btnZoomIn" title="Phóng to bảng">+</button>
        <button id="btnToggleUI" title="Cài đặt">⚙️</button>
        <button id="btnFullscreen" title="Toàn màn hình">⛶</button>
    </div>

    <div class="nav-bar glass-panel" id="navBar">
        <a href="index.html">Trục Giờ Thi</a>
        <a href="dongho.html" class="active">Đồng Hồ</a>
    </div>

    <div class="control-panel glass-panel" id="controlPanel">
        
        <div class="mode-selector-menu" id="modeMenu">
            <div class="mode-option active" data-mode="realtime">Giờ Thực Tế</div>
            <div class="mode-option" data-mode="pomodoro">Pomodoro</div>
        </div>
        
        <div class="control-group" id="pomodoroControls" style="display: none;">
            <label>Làm việc: <input type="number" id="pomoWork" value="25" min="1"> p</label>
            <label style="margin-left:15px">Nghỉ ngơi: <input type="number" id="pomoBreak" value="5" min="1"> p</label>
        </div>

        <div class="control-group" id="actionControls" style="display: none; padding-top:10px; border-top: 1px solid var(--glass-border);">
            <button class="btn-action" id="btnStart" onclick="startCountdown()">▶ BẮT ĐẦU [SPACE]</button>
            <button class="btn-action" id="btnPause" onclick="pauseCountdown()">TẠM DỪNG</button>
            <button class="btn-action" id="btnReset" onclick="resetCountdown()">ĐẶT LẠI</button>
        </div>
    </div>

    <div class="board glass-panel" id="mainBoard">
        <div id="clockDisplay" class="digital-clock">00:00:00</div>
        <div class="time-up" id="timeUpMsg"></div>
    </div>
    
    <div class="footer-copyleft" id="footerCopy">
        Phát triển bởi <a href="https://www.facebook.com/pdtandfriends" target="_blank">PDT and Friends</a> | 
        Giấy phép <a href="http://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>
    </div>

    <script>
        // --- CHUYỂN THEME ---
        document.getElementById('btnThemeToggle').addEventListener('click', () => document.body.classList.toggle('dark-theme'));

        // --- WAKE LOCK ---
        let wakeLock = null;
        async function keepScreenAwake() { try { if ('wakeLock' in navigator && wakeLock === null) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
        function allowScreenSleep() { if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); } }
        document.addEventListener('click', () => { if (mode === 'realtime' || isRunning) keepScreenAwake(); }, { once: true });
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && (isRunning || mode === 'realtime')) keepScreenAwake(); });

        // --- CÁC NÚT GIAO DIỆN CHUNG ---
        const navBar = document.getElementById('navBar'); 
        const controlPanel = document.getElementById('controlPanel');
        const boardEl = document.getElementById('mainBoard'); 
        const footerCopy = document.getElementById('footerCopy');
        let currentScale = 1;

        document.getElementById('btnToggleUI').addEventListener('click', () => { 
            navBar.classList.toggle('hidden'); controlPanel.classList.toggle('hidden'); footerCopy.classList.toggle('hidden'); 
        });
        document.getElementById('btnFullscreen').addEventListener('click', () => { 
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); 
        });
        document.getElementById('btnToggleBoard').addEventListener('click', () => { 
            boardEl.classList.toggle('minimal'); 
            const iconBoard = document.getElementById('iconBoard');
            if(boardEl.classList.contains('minimal')){
                iconBoard.innerHTML = '<path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>';
            } else {
                iconBoard.innerHTML = '<path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/><path d="M14.59 8L12 10.59 9.41 8 8 9.41 10.59 12 8 14.59 9.41 16 12 13.41 14.59 16 16 14.59 13.41 12 16 9.41 14.59 8z"/>';
            }
        });
        document.getElementById('btnZoomIn').addEventListener('click', () => { if (currentScale < 2.5) { currentScale += 0.1; boardEl.style.transform = `scale(${currentScale})`; } });
        document.getElementById('btnZoomOut').addEventListener('click', () => { if (currentScale > 0.4) { currentScale -= 0.1; boardEl.style.transform = `scale(${currentScale})`; } });

        // --- LOGIC THỜI GIAN & POMODORO ---
        let mode = 'realtime';
        let realtimeInterval, countdownInterval;
        let isRunning = false, isPaused = false;
        let totalSeconds = 0;
        let isPomoWorkSession = true; 
        let audioCtx;

        const clockDisplay = document.getElementById('clockDisplay');
        const pomodoroControls = document.getElementById('pomodoroControls');
        const actionControls = document.getElementById('actionControls');
        const btnStart = document.getElementById('btnStart');
        const btnPause = document.getElementById('btnPause');
        const timeUpMsg = document.getElementById('timeUpMsg');

        // Phím Space Bắt đầu
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                e.preventDefault(); 
                if (mode !== 'realtime' && !isRunning) startCountdown();
            }
        });

        // Menu Chọn Chế độ
        const modeOptions = document.querySelectorAll('.mode-option');
        modeOptions.forEach(opt => {
            opt.addEventListener('click', (e) => {
                modeOptions.forEach(o => o.classList.remove('active'));
                e.target.classList.add('active');
                mode = e.target.getAttribute('data-mode');
                
                if (mode === 'realtime') {
                    pomodoroControls.style.display = 'none';
                    actionControls.style.display = 'none';
                    resetCountdown();
                    startRealtime();
                } else {
                    pomodoroControls.style.display = 'flex';
                    actionControls.style.display = 'flex';
                    clearInterval(realtimeInterval);
                    resetCountdown();
                    allowScreenSleep();
                }
            });
        });

        function formatTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function updateDisplay(s) { clockDisplay.textContent = formatTime(s); }

        function startRealtime() {
            keepScreenAwake();
            const updateRealtime = () => {
                const now = new Date();
                clockDisplay.textContent = `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            };
            updateRealtime();
            realtimeInterval = setInterval(updateRealtime, 1000);
            timeUpMsg.style.display = 'none';
        }

        function getInitialSeconds() {
            return parseInt(document.getElementById(isPomoWorkSession ? 'pomoWork' : 'pomoBreak').value) * 60;
        }

        function startCountdown() {
            if (isRunning && !isPaused) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (!isPaused) totalSeconds = getInitialSeconds();
            
            keepScreenAwake();
            isRunning = true; isPaused = false;
            btnStart.style.display = 'none'; btnPause.style.display = 'block';
            timeUpMsg.style.display = 'none';
            timeUpMsg.classList.remove('break-mode');

            countdownInterval = setInterval(() => {
                totalSeconds--;
                updateDisplay(totalSeconds);
                
                if (totalSeconds <= 0) {
                    playAlarm();
                    
                    isPomoWorkSession = !isPomoWorkSession;
                    totalSeconds = getInitialSeconds(); 
                    updateDisplay(totalSeconds);
                    
                    timeUpMsg.style.display = 'block';
                    if (isPomoWorkSession) {
                        timeUpMsg.textContent = 'VÀO LÀM THÔI!';
                        timeUpMsg.classList.remove('break-mode');
                    } else {
                        timeUpMsg.textContent = 'GIẢI LAO!';
                        timeUpMsg.classList.add('break-mode');
                    }
                    setTimeout(() => { if(isRunning) timeUpMsg.style.display = 'none'; }, 3500);
                }
            }, 1000);
        }

        function pauseCountdown() {
            clearInterval(countdownInterval); isPaused = true; allowScreenSleep();
            btnStart.style.display = 'block'; btnStart.textContent = 'TIẾP TỤC [SPACE]'; btnPause.style.display = 'none';
        }

        function resetCountdown() {
            if (isRunning && !confirm("Đang chạy Pomodoro! Bạn có chắc chắn muốn đặt lại không?")) return;
            clearInterval(countdownInterval);
            isRunning = false; isPaused = false; isPomoWorkSession = true; 
            allowScreenSleep();
            btnStart.style.display = 'block'; btnStart.textContent = '▶ BẮT ĐẦU [SPACE]'; btnPause.style.display = 'none';
            timeUpMsg.style.display = 'none';
            if (mode === 'pomodoro') {
                totalSeconds = getInitialSeconds();
                updateDisplay(totalSeconds);
            }
        }

        function playAlarm() {
            const t = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator(), osc2 = audioCtx.createOscillator(), lfo = audioCtx.createOscillator();
            osc1.type = 'square'; osc1.frequency.value = 750; osc2.type = 'square'; osc2.frequency.value = 1000;
            lfo.type = 'sine'; lfo.frequency.value = 35;
            const lfoGain = audioCtx.createGain(), mainGain = audioCtx.createGain(), vca = audioCtx.createGain();
            lfoGain.gain.value = 1; vca.gain.value = 0.5;
            mainGain.gain.setValueAtTime(0, t); mainGain.gain.linearRampToValueAtTime(0.2, t + 0.1); 
            mainGain.gain.setValueAtTime(0.2, t + 2.5); mainGain.gain.exponentialRampToValueAtTime(0.001, t + 3);
            lfo.connect(lfoGain); lfoGain.connect(vca.gain); osc1.connect(vca); osc2.connect(vca); 
            vca.connect(mainGain); mainGain.connect(audioCtx.destination);
            osc1.start(t); osc2.start(t); lfo.start(t); osc1.stop(t + 3); osc2.stop(t + 3); lfo.stop(t + 3);
        }

        window.addEventListener('beforeunload', e => { if (isRunning) { e.preventDefault(); e.returnValue = ''; }});
        startRealtime(); // Mặc định chạy giờ thực
    </script>
</body>
</html>
