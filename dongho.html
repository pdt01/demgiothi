<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồng Hồ Học Tập - PDT and Friends</title>
    <style>
        :root {
            --board-bg: #1e5128;
            --board-border: #8b5a2b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* Lớp dùng chung để ẩn các thành phần UI */
        .hidden {
            display: none !important;
        }

        /* Thanh điều hướng */
        .nav-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 200;
            transition: all 0.3s;
        }
        .nav-bar a {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
        }
        .nav-bar a:hover, .nav-bar a.active {
            background: rgba(255,255,255,0.3);
        }

        .control-panel {
            background: #34495e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            z-index: 100;
            margin-top: 50px;
            transition: all 0.3s;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        input[type="number"] { padding: 8px; border-radius: 4px; border: none; text-align: center; font-size: 16px; width: 80px; }
        .radio-group { display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.2); padding: 8px 20px; border-radius: 20px; }

        button {
            padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; transition: all 0.2s;
        }
        #btnStart { background: #27ae60; color: white; }
        #btnPause { background: #f39c12; color: white; display: none; }
        #btnReset { background: #e74c3c; color: white; }

        /* Bảng phấn */
        .board {
            background-color: var(--board-bg);
            border: 15px solid var(--board-border);
            border-radius: 10px;
            width: 85%;
            max-width: 800px;
            min-height: 400px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 15px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: auto 0; /* Giúp căn giữa khi ẩn bảng điều khiển */
        }

        /* Nút tùy chỉnh nằm trong góc bảng */
        .board-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 50;
        }

        .board-controls button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.2rem;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
            opacity: 0.3;
            transition: 0.3s;
            outline: none;
            text-transform: none; /* Tránh bị ảnh hưởng bởi button ở trên */
        }
        .board-controls button:hover {
            opacity: 1;
            background: rgba(255,255,255,0.1);
        }

        .digital-clock {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .time-up {
            display: none; position: absolute; top: 20px;
            font-size: 3rem; color: #e74c3c; font-family: 'Comic Sans MS', cursive, sans-serif;
            transform: rotate(-5deg); z-index: 50; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        @media (max-width: 600px) {
            .digital-clock { font-size: 5rem; }
            .board { min-height: 250px; }
            .board-controls { top: 10px; right: 10px; }
            .board-controls button { padding: 4px 6px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="nav-bar" id="navBar">
        <a href="index.html">📋 Trục Giờ Thi</a>
        <a href="dongho.html" class="active">⏱ Đồng Hồ</a>
    </div>

    <div class="control-panel" id="controlPanel">
        <div class="control-group">
            <div class="radio-group">
                <label><input type="radio" name="mode" value="realtime" checked> Giờ Thực Tế</label>
                <label><input type="radio" name="mode" value="countdown"> Đếm Ngược</label>
            </div>
        </div>
        
        <div class="control-group" id="countdownControls" style="display: none;">
            <label style="color: white; font-weight: bold;">Phút:</label>
            <input type="number" id="cdMinutes" value="25" min="1">
            <button id="btnStart" onclick="startCountdown()">▶ Bắt Đầu</button>
            <button id="btnPause" onclick="pauseCountdown()">⏸ Tạm Dừng</button>
            <button id="btnReset" onclick="resetCountdown()">⏹ Đặt Lại</button>
        </div>
    </div>

    <div class="board">
        <div class="board-controls">
            <button id="btnToggleUI" title="Ẩn/Hiện Cài đặt">⚙️</button>
            <button id="btnFullscreen" title="Toàn màn hình">⛶</button>
        </div>

        <div class="time-up" id="timeUpMsg">HẾT GIỜ!</div>
        <div id="clockDisplay" class="digital-clock">00:00:00</div>
        </div>

    <script>
        let mode = 'realtime';
        let realtimeInterval, countdownInterval;
        let isRunning = false;
        let isPaused = false;
        let totalSeconds = 0;
        let audioCtx;

        const clockDisplay = document.getElementById('clockDisplay');
        const countdownControls = document.getElementById('countdownControls');
        const btnStart = document.getElementById('btnStart');
        const btnPause = document.getElementById('btnPause');

        // --- XỬ LÝ ẨN/HIỆN GIAO DIỆN VÀ TOÀN MÀN HÌNH ---
        const navBar = document.getElementById('navBar');
        const controlPanel = document.getElementById('controlPanel');

        document.getElementById('btnToggleUI').addEventListener('click', () => {
            navBar.classList.toggle('hidden');
            controlPanel.classList.toggle('hidden');
        });

        document.getElementById('btnFullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Trình duyệt không hỗ trợ toàn màn hình: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });


        // --- LẮNG NGHE THAY ĐỔI CHẾ ĐỘ ---
        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                mode = e.target.value;
                if (mode === 'realtime') {
                    countdownControls.style.display = 'none';
                    resetCountdown();
                    startRealtime();
                } else {
                    countdownControls.style.display = 'flex';
                    clearInterval(realtimeInterval);
                    totalSeconds = parseInt(document.getElementById('cdMinutes').value) * 60;
                    updateDisplay(totalSeconds);
                }
            });
        });

        // --- HÀM FORMAT THỜI GIAN ĐÃ XÓA SỐ 0 Ở ĐẦU TIẾNG ---
        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            // Nếu có giờ, in ra h:mm:ss. Nếu không có giờ, in ra mm:ss.
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function updateDisplay(s) {
            clockDisplay.textContent = formatTime(s);
        }

        // --- CHẾ ĐỘ THỜI GIAN THỰC ---
        function startRealtime() {
            const updateRealtime = () => {
                const now = new Date();
                const h = now.getHours(); // Không dùng padStart để bỏ số 0 ở đầu
                const m = now.getMinutes().toString().padStart(2,'0');
                const s = now.getSeconds().toString().padStart(2,'0');
                clockDisplay.textContent = `${h}:${m}:${s}`;
            };
            updateRealtime();
            realtimeInterval = setInterval(updateRealtime, 1000);
            document.getElementById('timeUpMsg').style.display = 'none';
        }

        // --- CHẾ ĐỘ ĐẾM NGƯỢC ---
        function startCountdown() {
            if (isRunning && !isPaused) return;
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (!isPaused) {
                totalSeconds = parseInt(document.getElementById('cdMinutes').value) * 60;
            }
            
            isRunning = true;
            isPaused = false;
            btnStart.style.display = 'none';
            btnPause.style.display = 'block';
            document.getElementById('timeUpMsg').style.display = 'none';

            countdownInterval = setInterval(() => {
                totalSeconds--;
                updateDisplay(totalSeconds);
                if (totalSeconds <= 0) {
                    clearInterval(countdownInterval);
                    isRunning = false;
                    btnStart.style.display = 'block';
                    btnPause.style.display = 'none';
                    document.getElementById('timeUpMsg').style.display = 'block';
                    playAlarm();
                }
            }, 1000);
        }

        function pauseCountdown() {
            clearInterval(countdownInterval);
            isPaused = true;
            btnStart.style.display = 'block';
            btnStart.textContent = '▶ Tiếp Tục';
            btnPause.style.display = 'none';
        }

        function resetCountdown() {
            clearInterval(countdownInterval);
            isRunning = false;
            isPaused = false;
            btnStart.style.display = 'block';
            btnStart.textContent = '▶ Bắt Đầu';
            btnPause.style.display = 'none';
            document.getElementById('timeUpMsg').style.display = 'none';
            totalSeconds = parseInt(document.getElementById('cdMinutes').value) * 60;
            updateDisplay(totalSeconds);
        }

        // --- CHUÔNG BÁO ---
        function playAlarm() {
            const t = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator(); osc1.type = 'square'; osc1.frequency.value = 750;
            const osc2 = audioCtx.createOscillator(); osc2.type = 'square'; osc2.frequency.value = 1000;
            const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 35;
            const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 1;
            const mainGain = audioCtx.createGain(); mainGain.gain.setValueAtTime(0, t);
            mainGain.gain.linearRampToValueAtTime(0.2, t + 0.1); mainGain.gain.setValueAtTime(0.2, t + 2.5);
            mainGain.gain.exponentialRampToValueAtTime(0.001, t + 3);
            const vca = audioCtx.createGain(); vca.gain.value = 0.5;
            lfo.connect(lfoGain); lfoGain.connect(vca.gain);
            osc1.connect(vca); osc2.connect(vca); vca.connect(mainGain); mainGain.connect(audioCtx.destination);
            osc1.start(t); osc2.start(t); lfo.start(t);
            osc1.stop(t + 3); osc2.stop(t + 3); lfo.stop(t + 3);
        }

        // --- CẢNH BÁO KHI TẢI LẠI TRANG (F5) NẾU ĐANG ĐẾM NGƯỢC ---
        window.addEventListener('beforeunload', function (e) {
            if (isRunning) {
                e.preventDefault(); 
                e.returnValue = ''; 
            }
        });

        // Khởi chạy mặc định
        startRealtime();
    </script>
</body>
</html>
