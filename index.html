<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đếm giờ thi</title>
    <style>
        /* CSS VARIABLES: CHUẨN APPLE LIQUID GLASS */
        :root {
            --bg-liquid: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); /* Nền sáng dịu */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2c3e50;
            --slash-color: #e74c3c;
            --board-width: 85%;
            --board-min-height: 350px;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body.dark-theme {
            --bg-liquid: linear-gradient(135deg, #141e30 0%, #243b55 100%); /* Nền tối sâu thẳm */
            --glass-bg: rgba(0, 0, 0, 0.35);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ecf0f1;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-liquid);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* CLASS HIỆU ỨNG KÍNH (Dùng chung) */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }

        .hidden { display: none !important; }

        /* --- BONG BÓNG MENU --- */
        .floating-bubble {
            position: fixed; top: 20px; right: 20px; 
            border-radius: 30px; padding: 5px 10px; display: flex; align-items: center;
            gap: 8px; z-index: 9999; user-select: none; touch-action: none; 
            transition: transform 0.1s ease-out; /* Mượt hơn khi kéo */
        }
        .drag-handle { color: var(--text-main); cursor: grab; padding: 5px; display: flex; align-items: center; justify-content: center; width: 24px; opacity: 0.7; }
        .drag-handle:active { cursor: grabbing; }

        .floating-bubble button {
            background: rgba(255,255,255,0.2); border: 1px solid var(--glass-border);
            color: var(--text-main); font-size: 1.1rem; padding: 0; border-radius: 50%;
            width: 36px; height: 36px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: background 0.2s, transform 0.2s;
            outline: none; font-weight: bold; flex-shrink: 0;
        }
        .floating-bubble button:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }

        .bubble-actions { display: flex; gap: 8px; overflow: hidden; max-width: 300px; transition: max-width 0.3s ease, opacity 0.3s ease; }
        .floating-bubble.collapsed .bubble-actions { max-width: 0; opacity: 0; pointer-events: none; }
        .svg-icon { width: 18px; height: 18px; fill: currentColor; }

        /* Thanh điều hướng */
        .nav-bar { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 200; border-radius: 20px; overflow: hidden; }
        .nav-bar a {
            color: var(--text-main); text-decoration: none; padding: 10px 20px; font-weight: bold; transition: 0.3s;
            background: transparent; border: none;
        }
        .nav-bar a:hover, .nav-bar a.active { background: rgba(255,255,255,0.25); box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        body.dark-theme .nav-bar a:hover, body.dark-theme .nav-bar a.active { background: rgba(255,255,255,0.15); }

        /* Bảng điều khiển */
        .control-panel {
            padding: 20px; border-radius: 20px; margin-top: 50px; margin-bottom: 25px;
            display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 1050px; z-index: 100;
        }
        .control-group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; padding-bottom: 10px; border-bottom: 1px solid var(--glass-border); }
        .time-group { border-bottom: none; padding-bottom: 0; }

        label { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        input[type="time"], input[type="number"], select { 
            padding: 6px; border-radius: 8px; border: 1px solid var(--glass-border); text-align: center; font-size: 14px; 
            background: rgba(255,255,255,0.2); color: var(--text-main); font-weight: 600; outline: none;
        }
        body.dark-theme input, body.dark-theme select { background: rgba(0,0,0,0.3); }
        input[type="text"] { width: 100px; font-family: monospace; }
        input[type="checkbox"], input[type="radio"] { cursor: pointer; margin: 0; }
        input[type="range"] { width: 80px; accent-color: var(--text-main); }
        
        .radio-group { display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.05); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--glass-border); }
        body.dark-theme .radio-group { background: rgba(255,255,255,0.05); }

        .helper-text { text-align: center; font-style: italic; font-size: 12px; margin-top: -5px; padding-bottom: 10px; border-bottom: 1px solid var(--glass-border); opacity: 0.8; }

        button.btn-apply-inline, button.btn-panel {
            background: rgba(255,255,255,0.25); color: var(--text-main); border: 1px solid var(--glass-border);
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body.dark-theme button.btn-apply-inline, body.dark-theme button.btn-panel { background: rgba(255,255,255,0.1); }
        
        button.btn-apply-inline { padding: 6px 15px; text-transform: uppercase; margin-left: 5px; }
        button.btn-panel { padding: 12px 25px; text-transform: uppercase; }
        
        button.btn-apply-inline:hover, button.btn-panel:hover { background: rgba(255,255,255,0.4); transform: translateY(-2px); }
        body.dark-theme button.btn-apply-inline:hover, body.dark-theme button.btn-panel:hover { background: rgba(255,255,255,0.2); }
        
        #btnStart { background: rgba(39, 174, 96, 0.7); color: white; border: none; }
        #btnReset { background: rgba(231, 76, 60, 0.7); color: white; border: none; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        /* Bảng hiển thị (Tấm kính lớn) */
        .board {
            border-radius: 20px; padding: 60px 50px; width: var(--board-width); max-width: 1100px; min-height: var(--board-min-height);
            position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; margin: auto 0;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .board.minimal {
            background: transparent !important; border-color: transparent !important; box-shadow: none !important; backdrop-filter: none !important;
        }

        .clocks-wrapper { display: flex; align-items: center; gap: 50px; margin-bottom: 40px; }

        /* Đồng hồ kim thích ứng theme */
        .analog-clock { width: 220px; height: 220px; border: 4px solid var(--text-main); border-radius: 50%; position: relative; display: none; }
        .analog-clock::before { content: ''; position: absolute; width: 14px; height: 14px; background: var(--text-main); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; }
        .clock-number { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin-top: -20px; margin-left: -20px; text-align: center; line-height: 40px; color: var(--text-main); font-family: -apple-system, sans-serif; font-size: 1.5rem; font-weight: 600; z-index: 5; }
        .hand { position: absolute; bottom: 50%; transform-origin: bottom center; background: var(--text-main); border-radius: 10px; }
        .hour-hand { width: 6px; height: 55px; left: calc(50% - 3px); z-index: 10; }
        .minute-hand { width: 4px; height: 85px; left: calc(50% - 2px); opacity: 0.7; z-index: 11; }
        .second-hand { width: 2px; height: 100px; left: calc(50% - 1px); background: #e74c3c; z-index: 12; }

        /* Đồng hồ số */
        .digital-clock { font-family: -apple-system, sans-serif; font-size: 6rem; font-weight: bold; color: var(--text-main); letter-spacing: -2px; display: none; }

        /* Trục thời gian thích ứng theme */
        .timeline-container { position: relative; width: 100%; margin-top: 20px; display: block; }
        .time-label { position: absolute; top: -60px; font-size: 2.2rem; font-family: -apple-system, sans-serif; font-weight: bold; color: var(--text-main); }
        .start-label { left: 0; transform: translateX(-20%); }
        .end-label { right: 0; transform: translateX(20%); }

        .timeline-track { position: relative; display: flex; width: 100%; height: 4px; background-color: var(--text-main); border-radius: 2px; }
        .timeline-track::after { content: ''; position: absolute; right: -20px; top: -8px; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 20px solid var(--text-main); transition: border-color 0.3s; }
        
        .running .timeline-track::after { border-left-color: #e74c3c; animation: blink 1.5s infinite; filter: drop-shadow(0 0 6px rgba(231, 76, 60, 0.8)); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .segment { flex: 1; position: relative; }
        .segment::before { content: ''; position: absolute; left: 0; top: -10px; width: 3px; height: 24px; background-color: var(--text-main); border-radius: 2px; }
        .segment:last-child::after { content: ''; position: absolute; right: 0; top: -10px; width: 3px; height: 24px; background-color: var(--text-main); border-radius: 2px; }
        .tick-label { position: absolute; bottom: -45px; right: -2px; transform: translateX(50%); font-family: -apple-system, sans-serif; font-weight: bold; font-size: 1.4rem; color: var(--text-main); opacity: 0.8; }

        .slash-nhieunet { position: absolute; width: 100%; height: 40px; top: 50%; transform: translateY(-50%); background: repeating-linear-gradient(-60deg, transparent, transparent 8px, var(--slash-color) 8px, var(--slash-color) 11px); display: none; z-index: 10; }
        .crossed .slash-nhieunet { display: block; }

        .time-up { display: none; position: absolute; bottom: 30px; right: 40px; font-size: 4rem; color: #e74c3c; font-weight: bold; transform: rotate(-5deg); z-index: 50; text-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .footer-copyleft { margin-top: 20px; font-size: 12px; text-align: center; opacity: 0.7; line-height: 1.5; font-weight: 500; }
        .footer-copyleft a { color: var(--text-main); text-decoration: underline; }

        @media (max-width: 600px) {
            .clocks-wrapper { flex-direction: column; gap: 20px; }
            .board { padding: 40px 20px; }
            .time-label { font-size: 1.5rem; top: -45px; }
            .tick-label { font-size: 1.2rem; bottom: -30px; }
            .control-panel { margin-top: 70px; }
            .btn-apply-inline { width: 100%; margin-left: 0; margin-top: 10px; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="floating-bubble glass-panel" id="floatingMenu">
        <div class="drag-handle" id="dragHandle" title="Kéo để di chuyển">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z"/></svg>
        </div>
        <button id="btnCollapseBubble" title="Thu gọn/Mở rộng">◀</button>
        <div class="bubble-actions" id="bubbleActions">
            <button id="btnThemeToggle" title="Giao diện Sáng/Tối">🌗</button>
            <button id="btnToggleBoard" title="Ẩn nền bảng">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>
            </button>
            <button id="btnToggleUI" title="Cài đặt">⚙️</button>
            <button id="btnFullscreen" title="Toàn màn hình">⛶</button>
        </div>
    </div>

    <div class="nav-bar glass-panel" id="navBar">
        <a href="index.html" class="active">Trục Giờ Thi</a>
        <a href="dongho.html">Đồng Hồ</a>
    </div>

    <div class="control-panel glass-panel" id="controlPanel">
        <div class="control-group time-group">
            <label>Bắt đầu: <input type="time" id="startTime" value="08:30"></label>
            <label>Thời lượng: <input type="number" id="durationTime" value="150" style="width:55px"> p</label>
            <label>Mỗi vạch: <input type="number" id="intervalTime" value="30" style="width:45px"> p</label>
            <label>Hiện mốc: <input type="text" id="customLabels" value="30, 60, 120"></label>
            <select id="labelMode">
                <option value="elapsed">Đã qua (30p)</option>
                <option value="clock">Giờ thực (9h00)</option>
            </select>
            <button class="btn-apply-inline" id="btnApply" onclick="applySettings()">🔄 Áp Dụng</button>
        </div>
        <div class="helper-text">* Vui lòng nhấn "Áp dụng" ngay sau khi thay đổi thời gian.</div>

        <div class="control-group">
            <label>Độ ngang bảng: <input type="range" id="boardWidth" min="50" max="100" value="85"></label>
            <label>Độ cao: <input type="range" id="boardHeight" min="250" max="700" value="350"></label>
            <label>Màu gạch chéo: <input type="color" id="slashColor" value="#e74c3c"></label>
        </div>

        <div class="control-group">
            <div class="radio-group">
                <span style="font-size: 13px; font-weight: bold;">Đồng hồ:</span>
                <label><input type="radio" name="clockType" value="analog" checked> Kim</label>
                <label><input type="radio" name="clockType" value="digital"> Số</label>
                <label><input type="radio" name="clockType" value="none"> Ẩn</label>
            </div>
            <div class="divider"></div>
            <label><input type="checkbox" id="checkTimeline" checked> Hiện trục số</label>
            <label><input type="checkbox" id="soundToggle" checked> Bật âm thanh</label>
        </div>
        
        <div class="btn-group">
            <button class="btn-panel" id="btnStart" onclick="startTimer()">▶ Bắt Đầu Tính Giờ</button>
            <button class="btn-panel" id="btnReset" onclick="resetTimer()">⏹ Đặt Lại</button>
        </div>
    </div>

    <div class="board glass-panel" id="mainBoard">
        <div class="clocks-wrapper">
            <div id="analogClock" class="analog-clock">
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
                <div class="hand second-hand" id="secondHand"></div>
            </div>
            <div id="digitalClock" class="digital-clock">0:00:00</div>
        </div>

        <div class="timeline-container" id="timelineContainer">
            <div class="time-label start-label" id="startLabel">8h30</div>
            <div class="timeline-track" id="timeline"></div>
            <div class="time-label end-label" id="endLabel">11h00</div>
        </div>

        <div class="time-up" id="timeUpMsg">HẾT GIỜ!</div>
    </div>

    <div class="footer-copyleft" id="footerCopy">
        Phát triển bởi <a href="https://www.facebook.com/link-facebook-cua-ban" target="_blank">PDT and Friends</a> | 
        Giấy phép <a href="http://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>
    </div>

    <script>
        // --- CHUYỂN ĐỔI GIAO DIỆN (THEME) ---
        const btnThemeToggle = document.getElementById('btnThemeToggle');
        btnThemeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
        });

        // --- WAKE LOCK API ---
        let wakeLock = null;
        async function keepScreenAwake() {
            try { if ('wakeLock' in navigator && wakeLock === null) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
        function allowScreenSleep() {
            if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); }
        }
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && isRunning) keepScreenAwake(); });

        // --- KÉO THẢ BONG BÓNG ---
        const floatingMenu = document.getElementById('floatingMenu');
        const dragHandle = document.getElementById('dragHandle');
        const btnCollapseBubble = document.getElementById('btnCollapseBubble');
        let isDragging = false, dragStartX, dragStartY;

        btnCollapseBubble.addEventListener('click', () => {
            floatingMenu.classList.toggle('collapsed');
            btnCollapseBubble.textContent = floatingMenu.classList.contains('collapsed') ? '▶' : '◀';
        });

        function dragStart(e) {
            if (e.target === dragHandle || dragHandle.contains(e.target)) {
                isDragging = true;
                dragStartX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
                dragStartY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
                floatingMenu.style.transition = 'none'; // Tắt transition khi kéo
            }
        }
        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            let dx = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - dragStartX;
            let dy = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - dragStartY;
            requestAnimationFrame(() => floatingMenu.style.transform = `translate3d(${dx}px, ${dy}px, 0)`);
        }
        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;
            const rect = floatingMenu.getBoundingClientRect();
            floatingMenu.style.transform = 'none'; floatingMenu.style.transition = '';
            floatingMenu.style.top = Math.max(0, Math.min(rect.top, window.innerHeight - rect.height)) + 'px';
            if (rect.left + rect.width / 2 > window.innerWidth / 2) {
                floatingMenu.style.left = 'auto'; floatingMenu.style.right = Math.max(0, window.innerWidth - rect.right) + 'px';
            } else {
                floatingMenu.style.right = 'auto'; floatingMenu.style.left = Math.max(0, rect.left) + 'px';
            }
        }
        floatingMenu.addEventListener("touchstart", dragStart, { passive: false });
        document.addEventListener("touchmove", drag, { passive: false });
        document.addEventListener("touchend", dragEnd);
        floatingMenu.addEventListener("mousedown", dragStart);
        document.addEventListener("mousemove", drag);
        document.addEventListener("mouseup", dragEnd);

        // --- CÁC NÚT ĐIỀU KHIỂN GIAO DIỆN ---
        const navBar = document.getElementById('navBar');
        const controlPanel = document.getElementById('controlPanel');
        const boardEl = document.getElementById('mainBoard');
        const footerCopy = document.getElementById('footerCopy');
        
        document.getElementById('btnToggleUI').addEventListener('click', () => {
            navBar.classList.toggle('hidden'); controlPanel.classList.toggle('hidden'); footerCopy.classList.toggle('hidden');
        });
        document.getElementById('btnFullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
            else document.exitFullscreen();
        });
        document.getElementById('btnToggleBoard').addEventListener('click', () => {
            boardEl.classList.toggle('minimal');
            document.getElementById('btnToggleBoard').innerHTML = boardEl.classList.contains('minimal') ? '☐' : '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>';
        });

        // --- LOGIC THỜI GIAN ---
        let timerInterval, audioCtx;
        let totalSeconds = 0, remainingSeconds = 0, segmentDurationSeconds = 0;
        let startH = 0, startM = 0; 
        let isRunning = false, currentCrossedCount = 0;
        
        const timelineEl = document.getElementById('timeline');
        const digitalClockEl = document.getElementById('digitalClock');
        const analogClockEl = document.getElementById('analogClock');
        const timelineContainerEl = document.getElementById('timelineContainer');
        const rootVars = document.documentElement.style;

        window.addEventListener('beforeunload', e => { if (isRunning) { e.preventDefault(); e.returnValue = ''; }});

        function drawClockNumbers() {
            const clock = document.getElementById('analogClock');
            for (let i = 1; i <= 12; i++) {
                const num = document.createElement('div'); num.className = 'clock-number'; num.textContent = i;
                num.style.transform = `rotate(${i * 30}deg) translate(0, -85px) rotate(-${i * 30}deg)`;
                clock.appendChild(num);
            }
        }
        drawClockNumbers();

        const updateVisibility = () => {
            const clockType = document.querySelector('input[name="clockType"]:checked').value;
            digitalClockEl.style.display = (clockType === 'digital') ? 'block' : 'none';
            analogClockEl.style.display = (clockType === 'analog') ? 'block' : 'none';
            timelineContainerEl.style.display = document.getElementById('checkTimeline').checked ? 'block' : 'none';
        };

        document.querySelectorAll('input[name="clockType"]').forEach(r => r.addEventListener('change', updateVisibility));
        document.getElementById('checkTimeline').addEventListener('change', updateVisibility);
        
        document.getElementById('slashColor').addEventListener('input', e => rootVars.setProperty('--slash-color', e.target.value));
        document.getElementById('boardWidth').addEventListener('input', e => rootVars.setProperty('--board-width', e.target.value + '%'));
        document.getElementById('boardHeight').addEventListener('input', e => rootVars.setProperty('--board-min-height', e.target.value + 'px'));

        function formatDigitalTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
            return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function playSound(type) {
            if (!document.getElementById('soundToggle').checked) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (type === 'alarm') {
                const t = audioCtx.currentTime;
                const osc1 = audioCtx.createOscillator(), osc2 = audioCtx.createOscillator(), lfo = audioCtx.createOscillator();
                osc1.type = 'square'; osc1.frequency.value = 750; osc2.type = 'square'; osc2.frequency.value = 1000;
                lfo.type = 'sine'; lfo.frequency.value = 35;
                const lfoGain = audioCtx.createGain(), mainGain = audioCtx.createGain(), vca = audioCtx.createGain();
                lfoGain.gain.value = 1; vca.gain.value = 0.5;
                mainGain.gain.setValueAtTime(0, t); mainGain.gain.linearRampToValueAtTime(0.2, t + 0.1); 
                mainGain.gain.setValueAtTime(0.2, t + 2.5); mainGain.gain.exponentialRampToValueAtTime(0.001, t + 3);
                lfo.connect(lfoGain); lfoGain.connect(vca.gain); osc1.connect(vca); osc2.connect(vca); 
                vca.connect(mainGain); mainGain.connect(audioCtx.destination);
                osc1.start(t); osc2.start(t); lfo.start(t); osc1.stop(t + 3); osc2.stop(t + 3); lfo.stop(t + 3);
            } else if (type === 'chalk') {
                const createScratch = (timeOffset) => {
                    const bufferSize = audioCtx.sampleRate * 0.15; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                    const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 3500; filter.Q.value = 1.2;
                    const gain = audioCtx.createGain(); const t = audioCtx.currentTime + timeOffset;
                    gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.6, t + 0.02); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                    noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start(t);
                };
                createScratch(0); createScratch(0.18); createScratch(0.36);
            }
        }

        function init() {
            const startStr = document.getElementById('startTime').value;
            const duration = parseInt(document.getElementById('durationTime').value);
            const interval = parseInt(document.getElementById('intervalTime').value);
            const labelArray = document.getElementById('customLabels').value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            const labelMode = document.getElementById('labelMode').value;
            
            [startH, startM] = startStr.split(':').map(Number);
            let endTotalMins = startH * 60 + startM + duration;
            document.getElementById('startLabel').textContent = startH + 'h' + (startM<10?'0'+startM:startM);
            document.getElementById('endLabel').textContent = (Math.floor(endTotalMins/60)%24) + 'h' + (endTotalMins%60<10?'0'+(endTotalMins%60):endTotalMins%60);
            
            totalSeconds = duration * 60; remainingSeconds = totalSeconds; segmentDurationSeconds = interval * 60;
            digitalClockEl.textContent = formatDigitalTime(remainingSeconds);
            updateAnalogClock(remainingSeconds);

            timelineEl.innerHTML = ''; document.getElementById('timeUpMsg').style.display = 'none';
            boardEl.classList.remove('running'); currentCrossedCount = 0;
            
            const numSegments = Math.ceil(duration/interval);
            for(let i = 0; i < numSegments; i++) {
                const seg = document.createElement('div'); seg.className = 'segment'; seg.innerHTML = `<div class="slash-nhieunet"></div>`;
                let currentMinuteTick = (i + 1) * interval;
                if (i !== numSegments - 1 && labelArray.includes(currentMinuteTick)) {
                    const label = document.createElement('div'); label.className = 'tick-label';
                    if (labelMode === 'elapsed') label.textContent = currentMinuteTick + 'p';
                    else {
                        let tMins = startH * 60 + startM + currentMinuteTick;
                        label.textContent = (Math.floor(tMins/60)%24) + 'h' + (tMins%60<10?'0'+(tMins%60):tMins%60);
                    }
                    seg.appendChild(label);
                }
                timelineEl.appendChild(seg);
            }
            updateVisibility();
        }

        function updateAnalogClock(remSecs) {
            const simulated = (startH * 3600) + (startM * 60) + (totalSeconds - remSecs);
            const h = Math.floor(simulated / 3600), m = Math.floor((simulated % 3600) / 60), s = simulated % 60;
            document.getElementById('hourHand').style.transform = `rotate(${(h%12)*30 + m*0.5}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(${m*6 + s*0.1}deg)`;
            document.getElementById('secondHand').style.transform = `rotate(${s*6}deg)`;
        }

        function update() {
            digitalClockEl.textContent = formatDigitalTime(remainingSeconds); updateAnalogClock(remainingSeconds);
            const crossed = Math.floor((totalSeconds - remainingSeconds) / segmentDurationSeconds);
            if (crossed > currentCrossedCount) {
                const segs = document.querySelectorAll('.segment');
                for (let i = currentCrossedCount; i < crossed; i++) if(segs[i]) segs[i].classList.add('crossed');
                currentCrossedCount = crossed;
                if (remainingSeconds > 0) playSound('chalk');
            }
        }

        function applySettings() {
            if (isRunning && !confirm("Đồng hồ đang chạy! Bạn muốn đặt lại không?")) return;
            clearInterval(timerInterval); isRunning = false; allowScreenSleep(); document.getElementById('btnStart').disabled = false; init();
        }

        function startTimer() {
            if (isRunning) return;
            if (remainingSeconds <= 0) init();
            keepScreenAwake(); isRunning = true; boardEl.classList.add('running'); document.getElementById('btnStart').disabled = true;
            timerInterval = setInterval(() => {
                remainingSeconds--; update();
                if (remainingSeconds <= 0) {
                    clearInterval(timerInterval); isRunning = false; allowScreenSleep(); boardEl.classList.remove('running');
                    document.getElementById('btnStart').disabled = false; document.getElementById('timeUpMsg').style.display = 'block'; playSound('alarm');
                }
            }, 1000);
        }

        function resetTimer() { if (isRunning && !confirm("Đồng hồ đang chạy! Bạn muốn đặt lại không?")) return; applySettings(); }

        document.documentElement.style.setProperty('--board-min-height', document.getElementById('boardHeight').value + 'px');
        init();
    </script>
</body>
</html>
